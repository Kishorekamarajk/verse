<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${newsItem.title + ' | Tec-Verse 2026'}">News Detail | Tec-Verse 2026</title>
    <link rel="icon" type="image/png" th:href="@{/images/tecverselogo.png}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = { corePlugins: { preflight: false }, theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="news-detail-page no-hero bg-white font-sans text-ink antialiased">

<div th:replace="~{fragments/navbar :: navbar('news')}"></div>
<div th:replace="~{fragments/floating-actions :: floating-actions}"></div>

<main class="news-detail-section">
    <article class="container news-detail">
        <header class="news-detail__header">
            <h1 th:text="${newsItem.title}">Shri Chandubhai Virani Joins Tech Expo Chennai 2026 As An Esteemed Speaker</h1>
        </header>

        <figure class="news-detail__media">
            <img th:src="@{${newsItem.image}}" th:alt="${newsItem.title}">
        </figure>

        <div class="news-detail__content">
            <p class="news-card__date"><strong>Date:</strong> <span th:text="${newsItem.date}">25 Apr 2026</span></p>
            <p th:each="paragraph : ${newsItem.paragraphs}" th:text="${paragraph}">Article paragraph.</p>
        </div>
    </article>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
