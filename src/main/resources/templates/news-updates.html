<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News &amp; Updates | Tec-Verse 2026</title>
    <link rel="icon" type="image/png" th:href="@{/images/tecverselogo.png}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            corePlugins: { preflight: false },
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#F47A20', light: '#FF9A3D' },
                        govt: { DEFAULT: '#35AA75', dark: '#061933', soft: '#EAF8F1' },
                        ink: '#07182F',
                        muted: '#4B5563',
                        line: '#DDE7EF',
                        surface: '#F3F7FA'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="news-page bg-white font-sans text-ink antialiased">

<div th:replace="~{fragments/navbar :: navbar('news')}"></div>
<div th:replace="~{fragments/floating-actions :: floating-actions}"></div>

<section class="contact-hero news-hero-banner" aria-labelledby="news-heading">
    <div class="contact-hero__overlay"></div>
    <div class="contact-hero__content container">
        <h1 id="news-heading" class="section-heading">News &amp; Updates</h1>
    </div>
</section>

<main class="news-list-section">
    <div class="container">
        <div class="news-grid">
            <article class="news-card" th:each="news, stat : ${newsItems}" data-reveal="fade-up" th:attr="data-reveal-delay=${stat.index % 3 * 90}">
                <a class="news-card__image-link" th:href="@{/news-updates/{slug}(slug=${news.slug})}" th:aria-label="${'Read ' + news.title}">
                    <img class="news-card__image" th:src="@{${news.image}}" th:alt="${news.title}" loading="lazy">
                </a>
                <div class="news-card__body">
                    <p class="news-card__date"><strong>Date:</strong> <span th:text="${news.date}">25 Apr 2026</span></p>
                    <h2 class="news-card__title">
                        <a th:href="@{/news-updates/{slug}(slug=${news.slug})}" th:text="${news.title}">AI Is Not The Future. It's The Floor.</a>
                    </h2>
                    <p class="news-card__excerpt" th:text="${news.excerpt}">Not too long ago, having a website made your business look modern.</p>
                    <a class="news-read-more" th:href="@{/news-updates/{slug}(slug=${news.slug})}">
                        Read More
                    </a>
                </div>
            </article>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
