<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="floating-actions"
     class="fixed inset-x-0 bottom-4 z-50 flex justify-center px-4 sm:bottom-6">
    <nav aria-label="Social media links"
         class="fixed right-0 top-1/2 z-50 flex -translate-y-1/2 flex-col overflow-hidden shadow-[0_14px_30px_rgba(7,24,47,0.18)]">
        <a href="#" aria-label="Facebook"
           class="flex h-12 w-12 items-center justify-center bg-[#1877F2] text-white transition-transform duration-300 hover:-translate-x-1 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white">
            <i class="bi bi-facebook text-[23px] leading-none"></i>
        </a>
        <a href="#" aria-label="LinkedIn"
           class="flex h-12 w-12 items-center justify-center bg-[#0A66C2] text-white transition-transform duration-300 hover:-translate-x-1 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white">
            <i class="bi bi-linkedin text-[21px] leading-none"></i>
        </a>
        <a href="#" aria-label="Instagram"
           class="flex h-12 w-12 items-center justify-center bg-gradient-to-br from-[#F58529] via-[#DD2A7B] to-[#8134AF] text-white transition-transform duration-300 hover:-translate-x-1 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white">
            <i class="bi bi-instagram text-[21px] leading-none"></i>
        </a>
        <a href="#" aria-label="YouTube"
           class="flex h-12 w-12 items-center justify-center bg-[#FF0000] text-white transition-transform duration-300 hover:-translate-x-1 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white">
            <i class="bi bi-youtube text-[22px] leading-none"></i>
        </a>
    </nav>
</div>

</body>
</html>
