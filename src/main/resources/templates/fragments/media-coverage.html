<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<section th:fragment="media-coverage" id="media-coverage" aria-labelledby="media-coverage-heading"
         class="relative isolate overflow-hidden bg-[#F8F9FB] py-[70px] sm:py-[92px]">

    <div class="pointer-events-none absolute inset-x-0 top-[35%] h-px bg-[#EAEAEA]" aria-hidden="true"></div>
    <div class="pointer-events-none absolute inset-y-0 left-0 w-28 bg-gradient-to-r from-[#F8F9FB] to-transparent sm:w-48" aria-hidden="true"></div>
    <div class="pointer-events-none absolute inset-y-0 right-0 w-28 bg-gradient-to-l from-[#F8F9FB] to-transparent sm:w-48" aria-hidden="true"></div>

    <div class="relative mx-auto max-w-[1440px] px-6 lg:px-10">
        <div class="text-center" data-reveal="fade-up">
            <h2 id="media-coverage-heading" class="section-heading font-sans">
                MEDIA COVERAGE / PR
            </h2>

            <div class="section-heading-rule" aria-hidden="true">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="mt-[78px] flex snap-x gap-6 overflow-x-auto pb-4 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden lg:gap-7"
             aria-label="Media coverage news cards">
            <article th:each="item, itemStat : ${#numbers.sequence(1,5)}"
                     data-reveal="fade-up"
                     th:attr="data-reveal-delay=${itemStat.index * 80}"
                     class="relative min-w-[270px] snap-center border-2 border-[#00856F] bg-white px-4 pb-5 pt-6 shadow-[8px_8px_0_rgba(255,107,26,0.12)] sm:min-w-[300px] lg:min-w-[320px]">
                <span class="absolute left-1/2 top-0 h-9 w-28 -translate-x-1/2 -translate-y-[62%] bg-[#FF6B1A]" aria-hidden="true"></span>

                <p class="text-center font-sans text-[15px] font-semibold leading-tight text-[#111111]">News</p>
                <span class="mt-2.5 block h-px w-full bg-[#EAEAEA]" aria-hidden="true"></span>

                <h3 class="media-card-text mt-3 font-sans text-[13px] font-normal leading-[1.45] text-[#111111] sm:text-[15px]">
                    TECVERSE 2026 brings together government, academia, startups, and industry for digital innovation.
                </h3>

                <div class="mt-8 flex justify-center">
                    <img th:src="@{/images/tecverselogo.png}" alt="TECVERSE logo" class="h-[118px] w-auto max-w-full object-contain" loading="lazy" />
                </div>

                <p class="media-card-text mt-4 font-sans text-[15px] font-normal leading-[1.45] text-[#111111] sm:text-[15px]">
                    Press announcements, partner updates, speaker highlights, and event coverage will be published
                    through verified TECVERSE communication channels.
                </p>
            </article>
        </div>
    </div>
</section>

</body>
</html>
