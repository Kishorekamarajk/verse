<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg site-navbar fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/images/tecverselogo.png}" alt="TECVERSE logo" class="navbar-logo" />
            <span class="navbar-brand-text">Tec-Verse 2026</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="mainNav" aria-labelledby="mainNavLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="mainNavLabel">Tec-Verse 2026</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                        data-bs-target="#mainNav" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav align-items-lg-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle nav-link-highlight" href="#" role="button" data-bs-toggle="dropdown"
                           aria-expanded="false">At a Glance</a>
                                               <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/retreat 2024}">retreat 2024</a></li>
                            <li><a class="dropdown-item" th:href="@{/retreat 2025}">retreat 2025</a></li>
                            <li><a class="dropdown-item" th:href="@{/retreat 2026}">retreat 2026</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${active == 'about'} ? 'active'" th:href="@{/about}">About Tec</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" th:classappend="${active == 'gallery' or active == 'news'} ? 'active'" href="#" role="button" data-bs-toggle="dropdown"
                           aria-expanded="false">Explore</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/gallery}">Gallery</a></li>
                            <li><a class="dropdown-item" th:href="@{/news-updates}">News & Update</a></li>
                            <!-- <li><a class="dropdown-item" th:href="@{/#media-coverage}">Media Coverage</a></li> -->
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${active == 'inquiry'} ? 'active'" th:href="@{/inquiry}">Contact Us</a>
                    </li>
                </ul>

                <div class="navbar-actions ms-lg-auto">
                    <a class="btn btn-sm navbar-action-btn navbar-action-btn-primary" th:href="@{/exhibitor-registration}">Register</a>
                    <a class="btn btn-sm navbar-action-btn navbar-action-btn-outline" th:href="@{/become-sponsor}">Become Sponsor</a>
                </div>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
